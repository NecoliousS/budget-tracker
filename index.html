<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Calyx Budget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #f0f0f5; }
    .glass {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }
    .dark-glass {
      background: #1e1b2e;
      color: #fff;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .purple-glow {
      background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
    }
    .sage-glow {
      background: linear-gradient(135deg, #a3b899 0%, #7aa372 100%);
    }
    .input-reset {
      background: #f3f4f6;
      border: none;
      outline: none;
      transition: all 0.2s;
    }
    .input-reset:focus { background: #e5e7eb; }
    .bar-col {
      border-radius: 6px 6px 0 0;
      background: linear-gradient(to top, #c4b5fd, #8b5cf6);
      width: 100%;
      transform-origin: bottom;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="text-gray-800 antialiased">

  <!-- ========== HEADER ========== -->
  <header class="sticky top-0 z-40 glass px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg purple-glow flex items-center justify-center text-white font-bold text-sm">CB</div>
      <div>
        <h1 class="font-bold text-gray-900 leading-tight text-sm">Dashboard</h1>
        <p class="text-[10px] text-gray-500 leading-tight">Track college expenses</p>
      </div>
    </div>
    <button id="addBtn" class="bg-gray-900 text-white px-4 py-2 rounded-full text-sm font-medium active:scale-95 transition-transform">
      + Add Expense
    </button>
  </header>

  <!-- ========== MAIN GRID ========== -->
  <main class="p-4 pb-24 max-w-6xl mx-auto space-y-4">

    <!-- ROW 1: Monthly Overview + Budget Status -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

      <!-- MONTHLY OVERVIEW (spans 2) -->
      <div class="lg:col-span-2 glass rounded-3xl p-5 card-anim">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-semibold text-gray-700 text-sm uppercase tracking-wide">Monthly Overview</h2>
          <span class="text-xs bg-gray-200 px-2 py-1 rounded-md text-gray-600" id="currentMonth">May 2026</span>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-5">
          <div class="bg-white rounded-2xl p-3 shadow-sm">
            <p class="text-[10px] text-gray-500 mb-1">Spent This Month</p>
            <p class="text-xl font-bold text-gray-900" id="spentDisplay">$0</p>
          </div>
          <div class="bg-white rounded-2xl p-3 shadow-sm">
            <p class="text-[10px] text-gray-500 mb-1">Budget Left</p>
            <p class="text-xl font-bold text-emerald-600" id="leftDisplay">$0</p>
          </div>
          <div class="dark-glass rounded-2xl p-3">
            <p class="text-[10px] text-gray-400 mb-1">Projected Semester</p>
            <p class="text-xl font-bold text-white" id="projectedDisplay">$0</p>
          </div>
        </div>

        <!-- CSS Bar Chart -->
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex justify-between text-[10px] text-gray-400 mb-2">
            <span>Spending Trend (Last 7 Days)</span>
          </div>
          <div class="h-28 flex items-end justify-between gap-2" id="barChart">
            <!-- Bars injected by JS -->
          </div>
        </div>
      </div>

      <!-- BUDGET STATUS -->
      <div class="dark-glass rounded-3xl p-5 card-anim flex flex-col justify-between">
        <h2 class="font-semibold text-sm uppercase tracking-wide text-gray-300 mb-4">Budget Status</h2>
        
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="purple-glow rounded-2xl p-3 text-white">
            <p class="text-[10px] text-purple-100 mb-1">Days Left</p>
            <p class="text-3xl font-bold" id="daysLeft">0</p>
          </div>
          <div class="bg-emerald-500/20 border border-emerald-500/30 rounded-2xl p-3">
            <p class="text-[10px] text-emerald-200 mb-1">Daily Budget</p>
            <p class="text-3xl font-bold text-emerald-300" id="dailyBudget">$0</p>
          </div>
        </div>

        <div class="bg-white/10 rounded-2xl p-3">
          <div class="flex justify-between text-xs mb-2">
            <span class="text-gray-300">Monthly Progress</span>
            <span class="text-white font-medium" id="progressText">0%</span>
          </div>
          <div class="h-2 bg-white/20 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-purple-400 rounded-full" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ROW 2: Category Chart + Transactions -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

      <!-- CATEGORY DONUT -->
      <div class="dark-glass rounded-3xl p-5 card-anim">
        <h2 class="font-semibold text-sm uppercase tracking-wide text-gray-300 mb-2">Spending by Category</h2>
        <div class="relative h-48 w-full flex items-center justify-center">
          <canvas id="categoryChart"></canvas>
        </div>
        <div id="categoryLegend" class="mt-3 space-y-2 text-xs">
          <!-- Legend injected by JS -->
        </div>
      </div>

      <!-- RECENT TRANSACTIONS -->
      <div class="lg:col-span-2 glass rounded-3xl p-5 card-anim">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-semibold text-gray-700 text-sm uppercase tracking-wide">Recent Transactions</h2>
          <button onclick="exportData()" class="text-xs text-purple-600 font-medium hover:text-purple-800">Export JSON</button>
        </div>
        <div id="transactionList" class="space-y-3 max-h-80 overflow-y-auto hide-scrollbar pr-1">
          <!-- Transactions injected by JS -->
        </div>
      </div>
    </div>

  </main>

  <!-- ========== ADD EXPENSE MODAL ========== -->
  <div id="modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" id="modalBackdrop"></div>
    <div class="absolute inset-0 flex items-end sm:items-center justify-center p-4 pointer-events-none">
      <div id="modalPanel" class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl pointer-events-auto transform translate-y-full opacity-0">
        <div class="flex justify-between items-center mb-5">
          <h3 class="text-lg font-bold text-gray-900">Add Expense</h3>
          <button id="closeModal" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">✕</button>
        </div>
        
        <form id="expenseForm" class="space-y-4">
          <div>
            <label class="text-xs font-medium text-gray-500 mb-1 block">Description</label>
            <input type="text" id="descInput" class="input-reset w-full rounded-xl px-4 py-3 text-sm" placeholder="e.g. Chipotle, Gas, Textbooks" required>
          </div>
          
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-medium text-gray-500 mb-1 block">Amount ($)</label>
              <input type="number" id="amountInput" step="0.01" min="0.01" class="input-reset w-full rounded-xl px-4 py-3 text-sm" placeholder="0.00" required>
            </div>
            <div>
              <label class="text-xs font-medium text-gray-500 mb-1 block">Category</label>
              <select id="catInput" class="input-reset w-full rounded-xl px-4 py-3 text-sm">
                <option value="food">🍔 Food</option>
                <option value="transport">🚗 Transport</option>
                <option value="housing">🏠 Housing</option>
                <option value="books">📚 Books</option>
                <option value="fun">🎮 Fun</option>
                <option value="other">📦 Other</option>
              </select>
            </div>
          </div>

          <button type="submit" class="w-full bg-gray-900 text-white font-medium py-3 rounded-xl mt-2 active:scale-[0.98] transition-transform">
            Save Transaction
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ========== JAVASCRIPT ========== -->
  <script type="module">
    // ======================
    // CONFIG
    // ======================
    const BUDGET = 1200; // ← Change this to your monthly budget
    const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    
    // ======================
    // STATE
    // ======================
    let transactions = [];
    let chartInstance = null;
    
    // Load from localStorage
    const raw = localStorage.getItem('calyx_budget_v1');
    if (raw) {
      try { transactions = JSON.parse(raw); } catch(e) {}
    }
    
    // ======================
    // FIREBASE (OPTIONAL - Fill in to enable sync)
    // ======================
    const FIREBASE_CONFIG = {
      // apiKey: "YOUR_API_KEY",
      // authDomain: "YOUR_PROJECT.firebaseapp.com",
      // projectId: "YOUR_PROJECT_ID",
    };
    
    let db = null;
    let userId = null;
    
    if (FIREBASE_CONFIG.apiKey) {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
      const { getFirestore, collection, addDoc, query, orderBy, onSnapshot } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      const { getAuth, signInAnonymously } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
      
      const app = initializeApp(FIREBASE_CONFIG);
      db = getFirestore(app);
      const auth = getAuth(app);
      const cred = await signInAnonymously(auth);
      userId = cred.user.uid;
      
      // Real-time sync from Firebase
      const q = query(collection(db, 'users', userId, 'transactions'), orderBy('timestamp', 'desc'));
      onSnapshot(q, snap => {
        if (snap.empty) return;
        transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        saveLocal();
        render();
      });
    }
    
    function saveLocal() {
      localStorage.setItem('calyx_budget_v1', JSON.stringify(transactions));
    }
    
    // ======================
    // RENDER ENGINE
    // ======================
    function render() {
      const now = new Date();
      const currentMonthStr = `${MONTH_NAMES[now.getMonth()]} ${now.getFullYear()}`;
      document.getElementById('currentMonth').textContent = currentMonthStr;
      
      // Filter to current month
      const thisMonth = transactions.filter(t => {
        const d = new Date(t.timestamp);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });
      
      const spent = thisMonth.reduce((s, t) => s + t.amount, 0);
      const left = Math.max(0, BUDGET - spent);
      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      const daysLeft = Math.max(0, daysInMonth - now.getDate());
      const daily = daysLeft > 0 ? (left / daysLeft) : 0;
      const projected = spent * (daysInMonth / Math.max(1, now.getDate())) * 4; // semester guess
      
      // Animate numbers
      animateMoney('spentDisplay', spent);
      animateMoney('leftDisplay', left);
      animateMoney('projectedDisplay', projected);
      animateNumber('daysLeft', daysLeft);
      animateMoney('dailyBudget', daily);
      
      // Progress bar
      const pct = Math.min(100, (spent / BUDGET) * 100);
      document.getElementById('progressText').textContent = Math.round(pct) + '%';
      anime({
        targets: '#progressBar',
        width: pct + '%',
        easing: 'easeOutQuart',
        duration: 1000
      });
      
      // Bar chart (last 7 days)
      renderBarChart();
      
      // Donut chart
      renderDonut();
      
      // Transaction list
      renderList();
    }
    
    function animateMoney(id, target) {
      const el = document.getElementById(id);
      const current = parseFloat(el.textContent.replace(/[^0-9.]/g, '')) || 0;
      anime({
        targets: { val: current },
        val: target,
        round: 100,
        easing: 'easeOutExpo',
        duration: 1200,
        update: function(a) {
          el.textContent = '$' + a.animations[0].currentValue.toLocaleString('en-US', {maximumFractionDigits: 0});
        }
      });
    }
    
    function animateNumber(id, target) {
      const el = document.getElementById(id);
      const current = parseInt(el.textContent) || 0;
      anime({
        targets: { val: current },
        val: target,
        round: 1,
        easing: 'easeOutExpo',
        duration: 1200,
        update: a => el.textContent = Math.round(a.animations[0].currentValue)
      });
    }
    
    function renderBarChart() {
      const container = document.getElementById('barChart');
      container.innerHTML = '';
      const days = ['S','M','T','W','T','F','S'];
      const today = new Date();
      
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const daySpent = transactions
          .filter(t => {
            const td = new Date(t.timestamp);
            return td.toDateString() === d.toDateString();
          })
          .reduce((s, t) => s + t.amount, 0);
        
        const max = BUDGET / 10; // scale factor
        const h = Math.min(100, (daySpent / max) * 100);
        const isToday = i === 0;
        
        const col = document.createElement('div');
        col.className = 'flex flex-col items-center flex-1';
        col.innerHTML = `
          <div class="w-full relative" style="height: 80px;">
            <div class="bar-col absolute bottom-0 left-0 right-0" style="height: ${h}%"></div>
          </div>
          <span class="text-[10px] mt-1 ${isToday ? 'text-purple-600 font-bold' : 'text-gray-400'}">${days[d.getDay()]}</span>
        `;
        container.appendChild(col);
      }
      
      // Animate bars growing
      anime({
        targets: '.bar-col',
        scaleY: [0, 1],
        easing: 'easeOutBack',
        duration: 800,
        delay: anime.stagger(50)
      });
    }
    
    function renderDonut() {
      const now = new Date();
      const thisMonth = transactions.filter(t => {
        const d = new Date(t.timestamp);
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      });
      
      const cats = { food: 0, transport: 0, housing: 0, books: 0, fun: 0, other: 0 };
      thisMonth.forEach(t => { cats[t.category] = (cats[t.category] || 0) + t.amount; });
      
      const labels = ['Food','Transport','Housing','Books','Fun','Other'];
      const data = [cats.food, cats.transport, cats.housing, cats.books, cats.fun, cats.other];
      const colors = ['#8b5cf6', '#60a5fa', '#a3b899', '#f472b6', '#fbbf24', '#9ca3af'];
      
      const ctx = document.getElementById('categoryChart').getContext('2d');
      
      if (chartInstance) chartInstance.destroy();
      
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors,
            borderWidth: 0,
            hoverOffset: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => ' $' + ctx.raw.toFixed(2)
              }
            }
          }
        }
      });
      
      // Custom legend
      const leg = document.getElementById('categoryLegend');
      leg.innerHTML = labels.map((l, i) => `
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full" style="background:${colors[i]}"></div>
            <span class="text-gray-300">${l}</span>
          </div>
          <span class="text-white font-medium">$${data[i].toFixed(0)}</span>
        </div>
      `).join('');
    }
    
    function renderList() {
      const list = document.getElementById('transactionList');
      const sorted = [...transactions].sort((a, b) => b.timestamp - a.timestamp).slice(0, 20);
      
      const emojis = { food: '🍔', transport: '🚗', housing: '🏠', books: '📚', fun: '🎮', other: '📦' };
      const catLabels = { food: 'Food', transport: 'Transport', housing: 'Housing', books: 'Books', fun: 'Fun', other: 'Other' };
      
      list.innerHTML = sorted.map((t, i) => `
        <div class="flex items-center justify-between p-3 bg-white rounded-2xl shadow-sm border border-gray-100 list-item" data-index="${i}">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-lg">
              ${emojis[t.category] || '📦'}
            </div>
            <div>
              <p class="font-medium text-gray-800 text-sm">${t.desc}</p>
              <p class="text-[10px] text-gray-500">${catLabels[t.category] || t.category} • ${new Date(t.timestamp).toLocaleDateString()}</p>
            </div>
          </div>
          <p class="font-semibold text-red-500 text-sm">-$${t.amount.toFixed(2)}</p>
        </div>
      `).join('');
      
      if (sorted.length === 0) {
        list.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">No transactions yet. Add one!</div>`;
      }
    }
    
    // ======================
    // MODAL & FORM
    // ======================
    const modal = document.getElementById('modal');
    const panel = document.getElementById('modalPanel');
    const addBtn = document.getElementById('addBtn');
    const closeBtn = document.getElementById('closeModal');
    const backdrop = document.getElementById('modalBackdrop');
    
    function openModal() {
      modal.classList.remove('hidden');
      anime({
        targets: panel,
        translateY: ['100%', '0%'],
        opacity: [0, 1],
        easing: 'easeOutBack',
        duration: 400
      });
      document.getElementById('descInput').focus();
    }
    
    function closeModal() {
      anime({
        targets: panel,
        translateY: '100%',
        opacity: 0,
        easing: 'easeInBack',
        duration: 300,
        complete: () => modal.classList.add('hidden')
      });
    }
    
    addBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);
    
    document.getElementById('expenseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const t = {
        id: crypto.randomUUID(),
        desc: document.getElementById('descInput').value,
        amount: parseFloat(document.getElementById('amountInput').value),
        category: document.getElementById('catInput').value,
        timestamp: Date.now()
      };
      
      transactions.push(t);
      saveLocal();
      
      // Sync to Firebase if configured
      if (db && userId) {
        const { addDoc, collection } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        await addDoc(collection(db, 'users', userId, 'transactions'), t);
      }
      
      closeModal();
      e.target.reset();
      render();
      
      // Flash animation on new transaction
      setTimeout(() => {
        const first = document.querySelector('.list-item');
        if (first) {
          anime({
            targets: first,
            translateX: [20, 0],
            opacity: [0, 1],
            easing: 'easeOutExpo',
            duration: 600
          });
        }
      }, 100);
    });
    
    // ======================
    // ENTRANCE ANIMATIONS
    // ======================
    window.addEventListener('DOMContentLoaded', () => {
      anime({
        targets: '.card-anim',
        translateY: [30, 0],
        opacity: [0, 1],
        delay: anime.stagger(120),
        easing: 'easeOutExpo',
        duration: 900
      });
      
      render();
    });
    
    // ======================
    // EXPORT
    // ======================
    window.exportData = function() {
      const blob = new Blob([JSON.stringify(transactions, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `budget-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    };
  </script>
</body>
</html>
